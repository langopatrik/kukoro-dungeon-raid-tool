<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kukoro Dungeon Raid Player Data Tool</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #d4d4d4;
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    justify-content: center;
    padding: 20px 0;
    color: #000;
  }

  .app {
    width: 1000px;
    background: #fff;
    border: 1px solid #444;
    display: flex;
    flex-direction: column;
  }

  .title-bar {
    border-bottom: 1px solid #444;
    padding: 14px 0;
    text-align: center;
  }

  .title-bar h1 {
    margin: 0;
    font-size: 26px;
    font-weight: bold;
  }

  .main-area {
    display: flex;
    border-bottom: 1px solid #444;
  }

  .sidebar {
    width: 260px;
    border-right: 1px solid #444;
    padding: 14px 18px;
    overflow-y: auto;
    max-height: 780px;
  }

  .content {
    flex: 1;
    padding: 14px;
  }

  .field-label {
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .field-value {
    font-size: 14px;
    margin-bottom: 8px;
  }

  hr {
    border: none;
    border-top: 1px solid #666;
    margin: 10px 0 16px 0;
  }

  button {
    display: block;
    width: 160px;
    margin: 0 auto 6px auto;
    padding: 6px 0;
    background: #e6e6e6;
    border: 1px solid #888;
    border-radius: 2px;
    font-family: Georgia, serif;
    font-size: 13px;
    cursor: pointer;
  }

  button:hover {
    background: #d8d8d8;
  }

  button.link-style {
    color: #1a4fa0;
  }

  textarea {
    display: block;
    width: 100%;
    height: 70px;
    margin-bottom: 14px;
    font-family: Georgia, serif;
    font-size: 13px;
    resize: vertical;
    border: 1px solid #444;
    padding: 6px;
  }

  .chat {
    height: 720px;
    overflow-y: auto;
    border: 1px solid #444;
    padding: 10px;
    font-size: 14px;
    background: #fff;
  }

  .msg {
    margin-bottom: 6px;
    padding: 4px 0;
    border-bottom: 1px solid #ddd;
  }

  .tag {
    color: #00a86b;
    font-weight: bold;
  }

  .name {
    color: #1a4fa0;
    font-weight: bold;
  }

  .footer {
    text-align: center;
    padding: 12px 0;
    font-size: 14px;
  }

  .footer a {
    color: #1a4fa0;
  }

  body.dark {
    background: #1e1e1e;
    color: #eee;
  }

  body.dark .app {
    background: #2a2a2a;
    border-color: #666;
  }

  body.dark .sidebar,
  body.dark .title-bar,
  body.dark .main-area {
    border-color: #666;
  }

  body.dark .chat {
    background: #222;
    border-color: #666;
    color: #eee;
  }

  body.dark textarea {
    background: #333;
    color: #eee;
    border-color: #666;
  }

  body.dark button {
    background: #3a3a3a;
    color: #eee;
    border-color: #666;
  }

  body.dark button:hover {
    background: #454545;
  }

  body.dark .msg {
    border-color: #444;
  }
</style>
</head>

<body>

<div class="app">

  <div class="title-bar">
    <h1>Kukoro Dungeon Raid Player Data Tool</h1>
  </div>

  <div class="main-area">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="field-label">Twitch Channel:</div>
      <textarea id="channelInput" placeholder="Enter channel name..."></textarea>

      <button onclick="connect()">Connect Chat</button>

      <hr>

      <div class="field-label">Boss Race:</div>
      <button onclick="setBossRace()">Set</button>

      <hr>

      <div class="field-label">Organize by: Players</div>
      <button onclick="organizeBy('players')">Targets</button>

      <hr>

      <div class="field-label">Sort by: Name</div>
      <button onclick="sortBy('name')">Level</button>

      <hr>

      <div class="field-label">Player Data:</div>
      <textarea placeholder="Place player data here..."></textarea>

      <button class="link-style">Add Players</button>

      <hr>

      <button onclick="resetTool()">Reset</button>

      <hr>

      <button onclick="toggleDarkMode()">Dark Mode</button>

      <hr>

      <button class="link-style" onclick="readMe()">Read Me</button>

    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
      <div id="chat" class="chat"></div>
    </div>

  </div>

  <div class="footer">
    See "<a href="#">Read Me</a>" for Copyright &amp; Permissions.
  </div>

</div>

<script>
let ws;

/* ORIGINAL CHAT LOGIC (UNCHANGED) */
function connect() {
  const channel = document.getElementById("channelInput").value.trim().toLowerCase();
  if (!channel) return;

  const chatBox = document.getElementById("chat");
  chatBox.innerHTML = "";

  ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

  ws.onopen = () => {
    ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership");
    ws.send("NICK justinfan" + Math.floor(Math.random() * 100000));
    ws.send("JOIN #" + channel);
  };

  ws.onmessage = (event) => {
    const msg = event.data;

    if (msg.includes("PRIVMSG")) {

      const userMatch = msg.match(/display-name=([^;]+)/);
      const textMatch = msg.match(/PRIVMSG #[^ ]+ :(.*)/);

      const username = userMatch ? userMatch[1] : "Unknown";
      const text = textMatch ? textMatch[1] : "";

      const cleanedText = text.replace(/\u0001/g, "").trim();

      if (cleanedText.includes("[KUKORO]")) {

        const cleaned = cleanedText
          .replace("[KUKORO]", "")
          .trim();

        const div = document.createElement("div");
        div.className = "msg";

        div.innerHTML = `
          <span class="tag">[KUKORO]</span>
          <span class="name"> ${username}</span>: ${cleaned}
        `;

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }
  };
}

/* NEW BUTTON FUNCTIONS (minimal placeholders) */
function resetTool() {
  document.getElementById("chat").innerHTML = "";
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

function readMe() {
  alert("Kukoro Dungeon Raid Tool - Read Me placeholder");
}

function setBossRace() {
  alert("Boss Race set (placeholder)");
}

function organizeBy(type) {
  alert("Organize by: " + type);
}

function sortBy(type) {
  alert("Sort by: " + type);
}

</script>

</body>
</html>
